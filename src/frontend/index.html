<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles.css" />
  <script src="./index.ts" type="module" lang="typescript" defer></script>
  <title>Datatub</title>
</head>

<body>
  <div class="mx-auto w-full max-w-lg px-4 pt-16 md:max-w-3xl md:px-15 md:pt-30">
    <article class="prose md:prose-lg lg:prose-xl">
      <h1>Get notified when we launch!</h1>
      <p>Datatub is an enjoyable data exploration and interactive visualization tool in the making.</p>
      <form id="notify-form" novalidate class="flex flex-row gap-2 ">
        <input id="email-input" name="email" type="email" placeholder="Enter your email" required />
        <button id="notify-button" type="submit">Notify me</button>
      </form>
      <div class="p-1">
        <span id="notify-message" role="status" aria-live="polite"></span>
      </div>
    </article>
  </div>
</body>
</html>
